<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Football Pattern Hunter 2.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .pattern-card { border-left: 5px solid #28a745; background: #fff; transition: 0.3s; }
        .pattern-active { background-color: #d4edda !important; border: 2px solid #28a745; }
        .high-prob { color: #28a745; font-weight: bold; }
        #result-box { display: none; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="text-center mb-4">⚽ Football Pattern Hunter <span class="badge bg-dark">v2.0</span></h2>
    
    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h5>Εισαγωγή Αγώνα</h5>
                <div class="mb-3">
                    <label>Λίγκα</label>
                    <select id="league" class="form-select">
                        <option value="all">Όλες οι Λίγκες</option>
                        <option value="high_liquidity">Top 5 Ευρώπης</option>
                        <option value="goals_league">High Goals (GER/NED/AUT)</option>
                    </select>
                </div>
                <div class="row mb-3">
                    <div class="col"><label>Απόδοση 1</label><input type="number" id="odd1" class="form-control" step="0.01"></div>
                    <div class="col"><label>Απόδοση X</label><input type="number" id="oddX" class="form-control" step="0.01"></div>
                    <div class="col"><label>Απόδοση 2</label><input type="number" id="odd2" class="form-control" step="0.01"></div>
                </div>
                <div class="row mb-3">
                    <div class="col"><label>Over 1.5</label><input type="number" id="oddO15" class="form-control" step="0.01"></div>
                    <div class="col"><label>Under 4.5</label><input type="number" id="oddU45" class="form-control" step="0.01"></div>
                </div>
                <button onclick="analyzePattern()" class="btn btn-primary w-100">⚡ Έλεγχος Patterns</button>
            </div>
        </div>

        <div class="col-md-7">
            <div id="result-box" class="card shadow-sm p-4">
                <h4>Ανάλυση Μοτίβων</h4>
                <div id="detected-patterns"></div>
                <hr>
                <div id="stat-summary" class="mt-2"></div>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
